<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CÔNG CỤ TÌM LƯỚI IN</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔍</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #7c3aed;
            --gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            --secondary: #64748b;
            --success: #10b981;
            --background: #eef2f7;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.8);
            --border-subtle: rgba(0, 0, 0, 0.05);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.10), 0 2px 8px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --radius-lg: 24px;
            --highlight: #fef3c7;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #e8edf5 50%, #eef2f7 100%);
            background-attachment: fixed;
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding: 32px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ─── APP CARD ───────────────────────────────────────────── */
        .app-card {
            background: transparent;
            border-radius: var(--radius-lg);
            overflow: visible;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ─── HEADER ─────────────────────────────────────────────── */
        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-lg);
            padding: 28px 36px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
        }

        .logo {
            flex-shrink: 0;
            width: 52px;
            height: 52px;
            background: var(--gradient);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
        }

        .logo svg {
            width: 26px;
            height: 26px;
            color: white;
            stroke: white;
        }

        .header-text {
            flex: 1;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            line-height: 1.3;
            margin-bottom: 3px;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-light);
            font-weight: 400;
        }

        .author {
            flex-shrink: 0;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary);
            background: linear-gradient(135deg, rgba(37,99,235,0.08), rgba(124,58,237,0.08));
            border: 1px solid rgba(37, 99, 235, 0.18);
            padding: 5px 12px;
            border-radius: 20px;
            letter-spacing: 0.03em;
        }

        /* ─── SEARCH SECTION ─────────────────────────────────────── */
        .search-section {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-lg);
            padding: 32px 36px;
            box-shadow: var(--shadow);
        }

        .search-container {
            max-width: 640px;
            margin: 0 auto;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            stroke: var(--text-muted);
            pointer-events: none;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 16px 15px 44px;
            border: 1px solid rgba(0, 0, 0, 0.07);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.25s ease;
            background: #eef2f7;
            box-shadow:
                inset 3px 3px 8px rgba(0, 0, 0, 0.07),
                inset -3px -3px 8px rgba(255, 255, 255, 0.9);
            color: var(--text);
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: rgba(37, 99, 235, 0.3);
            box-shadow:
                inset 2px 2px 6px rgba(0, 0, 0, 0.06),
                inset -2px -2px 6px rgba(255, 255, 255, 0.9),
                0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            background: var(--gradient);
            color: white;
            border: none;
            padding: 15px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.25s ease;
            white-space: nowrap;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
            letter-spacing: 0.01em;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.45);
            filter: brightness(1.05);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }

        .suggestion {
            color: var(--text-light);
            font-size: 13.5px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .code-number {
            font-weight: 600;
            color: var(--primary);
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(37, 99, 235, 0.2);
            padding: 3px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
            box-shadow: var(--shadow-sm);
        }

        .code-number:hover {
            background: rgba(37, 99, 235, 0.08);
            border-color: rgba(37, 99, 235, 0.35);
            transform: translateY(-1px);
        }

        /* ─── RESULTS SECTION ────────────────────────────────────── */
        .results-section {
            padding: 0;
        }

        /* ─── SUMMARY CARD ───────────────────────────────────────── */
        .summary-card {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.06), rgba(124, 58, 237, 0.06));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(37, 99, 235, 0.12);
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 0;
        }

        .summary-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .summary-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: transform 0.2s ease;
        }

        .summary-item:hover {
            transform: translateY(-1px);
        }

        .summary-code {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 5px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .summary-count {
            color: var(--success);
            font-weight: 600;
            font-size: 0.85rem;
        }

        /* ─── RESULTS CONTAINER ──────────────────────────────────── */
        .results-container {
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .result-group {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            box-shadow: var(--shadow);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-count {
            background: var(--gradient);
            color: white;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }

        /* ─── RESULT CARDS ───────────────────────────────────────── */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 22px;
            transition: all 0.25s ease;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.04);
            outline: 1px solid rgba(0, 0, 0, 0.03);
        }

        .result-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.10), 0 2px 8px rgba(0, 0, 0, 0.06);
            border-color: rgba(37, 99, 235, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .stt-container {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .stt-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .stt-value {
            font-weight: 700;
            font-size: 1.1rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .date-container {
            display: flex;
            flex-direction: column;
            gap: 3px;
            align-items: flex-end;
        }

        .date-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .date-value {
            font-weight: 600;
            color: var(--text);
            font-size: 0.85rem;
            background: rgba(37, 99, 235, 0.07);
            padding: 3px 10px;
            border-radius: 6px;
            border: 1px solid rgba(37, 99, 235, 0.12);
        }

        .content {
            margin-bottom: 16px;
            line-height: 1.55;
            padding: 12px 14px;
            background: rgba(238, 242, 247, 0.65);
            border-radius: 10px;
            font-size: 0.9rem;
            color: var(--text);
            border: 1px solid rgba(0, 0, 0, 0.04);
            word-break: break-word;
        }

        .highlight {
            background: var(--highlight);
            padding: 1px 4px;
            border-radius: 4px;
            font-weight: 700;
            color: #92400e;
        }

        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .detail-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .detail-value {
            font-weight: 600;
            color: var(--text);
            font-size: 0.88rem;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            border-left: 3px solid transparent;
            border-image: var(--gradient) 1;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
        }

        /* ─── STATES ─────────────────────────────────────────────── */
        .no-results {
            text-align: center;
            padding: 72px 20px;
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
        }

        .no-results-icon {
            font-size: 3.5rem;
            margin-bottom: 18px;
            opacity: 0.4;
            display: block;
        }

        .no-results h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--text);
            font-weight: 700;
        }

        .no-results p {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .loading {
            text-align: center;
            padding: 64px 20px;
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
        }

        .loading-spinner {
            width: 42px;
            height: 42px;
            border: 3px solid rgba(37, 99, 235, 0.12);
            border-top: 3px solid var(--primary);
            border-right: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
            margin: 0 auto 20px;
        }

        .loading p {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-light);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(254, 242, 242, 0.9);
            color: #dc2626;
            padding: 20px 24px;
            border-radius: var(--radius);
            border-left: 4px solid #dc2626;
            margin: 0;
            font-size: 0.9rem;
            font-weight: 500;
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow-sm);
        }

        .ready-message {
            text-align: center;
            padding: 56px 20px;
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
        }

        .ready-icon {
            font-size: 2.75rem;
            margin-bottom: 14px;
            display: block;
        }

        .ready-message h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .ready-message p {
            font-size: 0.88rem;
            color: var(--text-light);
        }

        /* ─── RESPONSIVE ─────────────────────────────────────────── */
        @media (max-width: 768px) {
            body {
                padding: 20px 16px;
            }

            header {
                padding: 20px 24px;
                gap: 14px;
            }

            h1 {
                font-size: 1.1rem;
            }

            .author {
                display: none;
            }

            .search-section {
                padding: 24px;
            }

            .search-box {
                flex-direction: column;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }

            .result-group {
                padding: 20px;
            }

            .details {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .search-section {
                padding: 20px 16px;
            }

            .results-container {
                padding: 0;
            }

            .card-header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .date-container {
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-card">
            <header>
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                </div>
                <div class="header-text">
                    <h1>CÔNG CỤ TÌM LƯỚI IN NHANH</h1>
                    <div class="subtitle">Tra cứu lưới in theo mã số — dữ liệu đồng bộ từ Google Sheets</div>
                </div>
                <div class="author">Made by HUY-SAM</div>
            </header>

            <div class="search-section">
                <div class="search-container">
                    <div class="search-box">
                        <div class="input-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                            </svg>
                            <input type="text" id="searchInput" placeholder="Nhập mã số (ví dụ: 1000102, 0121-158)">
                        </div>
                        <button id="searchButton">Tìm Kiếm</button>
                    </div>
                    <div class="suggestion">
                        <span>Gợi ý thử:</span>
                        <span class="code-number" data-code="1433079">1433079</span>
                        <span class="code-number" data-code="1424106">1424106</span>
                    </div>
                </div>
            </div>

            <div id="resultsSection" class="results-section">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Đang tải dữ liệu từ Google Sheets...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // URL của Google Sheet CSV
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQnGg42Bo-HuHVWr9ArftVArDrOHl3Yp6CCe-iU9Q7f7CeXjuslTXRapfP8LjkRfw/pub?output=csv';

        // Biến lưu trữ dữ liệu từ Google Sheet
        let sheetData = [];

        // Hàm tải dữ liệu từ Google Sheet CSV
        async function loadSheetData() {
            try {
                showLoading('Đang tải dữ liệu từ Google Sheets...');

                const response = await fetch(CSV_URL);
                if (!response.ok) {
                    throw new Error(`Lỗi HTTP: ${response.status}`);
                }

                const csvText = await response.text();

                // Chuyển đổi CSV thành mảng đối tượng
                sheetData = parseCSV(csvText);
                console.log('Dữ liệu đã tải:', sheetData);

                // Ẩn trạng thái loading
                hideLoading();

                // Hiển thị thông báo sẵn sàng
                showReadyMessage();

            } catch (error) {
                console.error('Lỗi khi tải dữ liệu:', error);
                showError('Không thể tải dữ liệu từ Google Sheet. Liên hệ HuyIT để upload lại dữ liệu.');
            }
        }

        // Hàm phân tích CSV
        function parseCSV(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim());
            const result = [];

            if (lines.length === 0) return result;

            // Lấy tiêu đề cột (xử lý cả trường hợp có BOM)
            const headers = lines[0].split(',').map(header =>
                header.trim().replace(/^\uFEFF/, '') // Loại bỏ BOM nếu có
            );

            // Xử lý từng dòng dữ liệu
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const obj = {};
                const values = parseCSVLine(line);

                headers.forEach((header, index) => {
                    obj[header] = (values[index] || '').trim();
                });

                result.push(obj);
            }

            return result;
        }

        // Hàm phân tích dòng CSV, xử lý trường hợp có dấu phẩy trong giá trị
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];

                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }

            result.push(current);
            return result.map(value => value.replace(/^"|"$/g, '').trim()); // Loại bỏ dấu ngoặc kép
        }

        // Hàm escape HTML để tránh XSS
        function escapeHTML(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // Hàm highlight mã số trong nội dung (không phân biệt hoa thường)
        function highlightCode(content, codes) {
            let highlightedContent = escapeHTML(content);
            codes.forEach(code => {
                // Tạo regex với flag 'gi' (global, case-insensitive)
                const regex = new RegExp(`(${escapeHTML(code)})`, 'gi');
                highlightedContent = highlightedContent.replace(regex, '<span class="highlight">$1</span>');
            });
            return highlightedContent;
        }

        // Hàm hiển thị loading
        function showLoading(message) {
            const resultsSection = document.getElementById('resultsSection');
            resultsSection.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>${message}</p>
                </div>
            `;
        }

        // Hàm ẩn loading
        function hideLoading() {
            // Chỉ ẩn nếu đang hiển thị loading
            const resultsSection = document.getElementById('resultsSection');
            if (resultsSection.querySelector('.loading')) {
                resultsSection.innerHTML = '';
            }
        }

        // Hàm hiển thị thông báo sẵn sàng
        function showReadyMessage() {
            const resultsSection = document.getElementById('resultsSection');
            resultsSection.innerHTML = `
                <div class="ready-message">
                    <div class="ready-icon">✅</div>
                    <h3>Dữ liệu đã sẵn sàng!</h3>
                    <p>Hãy nhập mã số để bắt đầu tìm kiếm</p>
                </div>
            `;
        }

        // Hàm hiển thị lỗi
        function showError(message) {
            const resultsSection = document.getElementById('resultsSection');
            resultsSection.innerHTML = `<div class="error">${message}</div>`;
        }

        // Hàm tìm kiếm mã số trong dữ liệu (không phân biệt hoa thường)
        function searchCodes(searchText) {
            if (!searchText.trim()) {
                return {};
            }

            // Tách các mã số từ input (có thể nhập nhiều mã số phân cách bằng dấu phẩy)
            const searchCodes = searchText.split(',')
                .map(code => code.trim())
                .filter(code => code);

            // Tìm kiếm các bản ghi chứa ít nhất một trong các mã số
            const results = {};

            searchCodes.forEach(code => {
                results[code] = sheetData.filter(row => {
                    // Kiểm tra mã số trong cột "Nội dung bên trong lưới" (không phân biệt hoa thường)
                    const content = row['Nội dung bên trong lưới'] || '';
                    // Chuyển cả nội dung và mã số về chữ thường để so sánh
                    return content.toLowerCase().includes(code.toLowerCase());
                });
            });

            return results;
        }

        // Hàm hiển thị kết quả
        function displayResults(searchResults) {
            const resultsSection = document.getElementById('resultsSection');

            // Xóa kết quả cũ
            resultsSection.innerHTML = '';

            // Tổng hợp kết quả
            let totalResults = 0;
            let foundCodes = [];

            Object.keys(searchResults).forEach(code => {
                if (searchResults[code].length > 0) {
                    totalResults += searchResults[code].length;
                    foundCodes.push(code);
                }
            });

            // Hiển thị tổng hợp kết quả
            if (totalResults > 0) {
                // Tạo summary card
                const summaryDiv = document.createElement('div');
                summaryDiv.className = 'summary-card';

                let summaryHTML = `
                    <div class="summary-title">
                        <span>📊 TỔNG HỢP KẾT QUẢ</span>
                    </div>
                    <div class="summary-grid">
                `;

                foundCodes.forEach(code => {
                    const count = searchResults[code].length;
                    summaryHTML += `
                        <div class="summary-item">
                            <div class="summary-code">${escapeHTML(code)}</div>
                            <div class="summary-count">${count} lưới</div>
                        </div>
                    `;
                });

                summaryHTML += `</div>`;
                summaryDiv.innerHTML = summaryHTML;
                resultsSection.appendChild(summaryDiv);

                // Tạo container cho kết quả chi tiết
                const resultsContainer = document.createElement('div');
                resultsContainer.className = 'results-container';

                // Hiển thị chi tiết kết quả
                foundCodes.forEach(code => {
                    const codeGroup = document.createElement('div');
                    codeGroup.className = 'result-group';

                    let codeHTML = `
                        <div class="result-header">
                            <div class="result-title">Mã số: ${escapeHTML(code)}</div>
                            <div class="result-count">${searchResults[code].length} kết quả</div>
                        </div>
                        <div class="results-grid">
                    `;

                    searchResults[code].forEach((item, index) => {
                        const highlightedContent = highlightCode(item['Nội dung bên trong lưới'] || 'N/A', [code]);
                        const kichThuoc = escapeHTML(item['Kiến thuớc lưới'] || item['Kích thước lưới'] || 'N/A');
                        const chatLieu = escapeHTML(item['Chất liệu'] || 'N/A');

                        codeHTML += `
                            <div class="result-card">
                                <div class="card-header">
                                    <div class="stt-container">
                                        <div class="stt-label">STT</div>
                                        <div class="stt-value">${escapeHTML(item.STT || 'N/A')}</div>
                                    </div>
                                    <div class="date-container">
                                        <div class="date-label">Ngày làm</div>
                                        <div class="date-value">${escapeHTML(item['Ngày làm'] || 'N/A')}</div>
                                    </div>
                                </div>
                                <div class="content">${highlightedContent}</div>
                                <div class="details">
                                    <div class="detail-item">
                                        <div class="detail-label">Kích thước</div>
                                        <div class="detail-value">${kichThuoc}</div>
                                    </div>
                                    <div class="detail-item">
                                        <div class="detail-label">Chất liệu</div>
                                        <div class="detail-value">${chatLieu}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    codeHTML += `</div>`;
                    codeGroup.innerHTML = codeHTML;
                    resultsContainer.appendChild(codeGroup);
                });

                resultsSection.appendChild(resultsContainer);
            } else {
                resultsSection.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <h3>Không tìm thấy kết quả</h3>
                        <p>Không tìm thấy kết quả nào cho mã số đã nhập.<br>Vui lòng thử với mã số khác.</p>
                    </div>
                `;
            }
        }

        // Hàm khởi tạo
        async function init() {
            // Tải dữ liệu từ Google Sheet
            await loadSheetData();

            // Thêm sự kiện cho nút tìm kiếm
            document.getElementById('searchButton').addEventListener('click', handleSearch);

            // Thêm sự kiện cho phím Enter
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleSearch();
                }
            });

            // Thêm sự kiện cho các mã số gợi ý
            document.querySelectorAll('.code-number').forEach(element => {
                element.addEventListener('click', () => {
                    document.getElementById('searchInput').value = element.getAttribute('data-code');
                    handleSearch();
                });
            });
        }

        // Hàm xử lý tìm kiếm
        function handleSearch() {
            const searchText = document.getElementById('searchInput').value;
            if (searchText.trim()) {
                const searchResults = searchCodes(searchText);
                displayResults(searchResults);
            }
        }

        // Khởi chạy ứng dụng khi trang tải xong
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
